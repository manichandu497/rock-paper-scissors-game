<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock Paper Scissors game</title>
    <link rel="stylesheet" href="JsP1.css">
</head>
<body>
    <h1>Rock Paper Scissors Game</h1>
    <h2>YOU VS COMPUTER</h2>
    <div class="choices">
        <button class="choice" id="rock"><img src="rock.png" alt="Rock"></button>
        <button class="choice" id="paper"><img src="paper.png" alt="Paper"></button>
        <button class="choice" id="scissors"><img src="scissors.png" alt="Scissors"></button>
    </div>
    <div class="score-board">
        <div class="score">
            <p id="user-score">0</p>
            <p>YOU</p>

        </div>
        <div class="score">
            <p id="computer-score">0</p>
            <p>COMP</p>
        </div>
    </div>
    <div class="mesg-container">
        <p id="msg">play your move </p>
    </div>






    <script src="javascript project1.js"></script>
</body>
</html>
